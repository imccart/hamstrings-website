project:
  type: website
  output-dir: docs

  resources:
    - "images/**"
    - "CNAME"
    - ".nojekyll"

website:
  title: "The Hamstrings"
  description: "The Hamstrings — Atlanta's cover band. Live music for your next event."
  site-url: "https://www.thehamstringsatl.com"
  favicon: images/logo-dark.png

  navbar:
    background: dark
    logo: images/logo-white.png
    logo-alt: "The Hamstrings"
    title: false
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Shows"
        href: shows.qmd
      - text: "What We Play"
        href: our-sound.qmd

    right:
      - icon: instagram
        href: https://www.instagram.com/thehamstringsatl
        aria-label: Instagram
      - icon: youtube
        href: https://www.youtube.com/@thehamstringsatl
        aria-label: YouTube
      - icon: facebook
        href: https://www.facebook.com/thehamstringsatl
        aria-label: Facebook
      - icon: twitter-x
        href: https://www.twitter.com/hamstringsatl
        aria-label: Twitter
      - icon: envelope-fill
        href: "mailto:hamstringsatl@gmail.com"
        aria-label: Email

  page-footer:
    background: dark
    center: |
      <div class="footer-content">
        <img src="images/logo-nav.png" class="footer-logo" alt="The Hamstrings">
        <div class="footer-text">Atlanta, GA &nbsp;·&nbsp; <a href="mailto:hamstringsatl@gmail.com">hamstringsatl@gmail.com</a> &nbsp;·&nbsp; <a href="tel:4049199538">404.919.9538</a></div>
        <div class="footer-copyright">&copy; 2025 The Hamstrings</div>
      </div>

format:
  html:
    theme: [cosmo, styles.scss]
    include-after-body: navbar-scroll.html
    grid:
      body-width: 1400px
    toc: false
    anchor-sections: false
